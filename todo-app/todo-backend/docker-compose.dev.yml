services:
  mongo:
    image: mongo
    # network_mode: "host"
    # security_opt:
    #   - seccomp:unconfined
    ports:
      - 3456:27017
    environment:
      MONGO_INITDB_ROOT_USERNAME: root
      MONGO_INITDB_ROOT_PASSWORD: example
      MONGO_INITDB_DATABASE: the_database
      GLIBC_TUNABLES: glibc.cpu.hwcaps=-SHSTK
    volumes:
       - ./mongo/mongo-init.js:/docker-entrypoint-initdb.d/mongo-init.js
       - mongo_data:/data/db
volumes:
   mongo_data:
